# ============================================================
# ACT (Action Chunking with Transformers) 基础超参数配置
# ============================================================

# --- 模型架构 (Network Architecture) ---
model:
  name: "ACT"
  # Transformer 编码器层数
  enc_layers: 4
  # Transformer 解码器层数
  dec_layers: 7
  # 注意力头数
  nheads: 8
  # 前馈网络隐藏层维度
  dim_feedforward: 3200
  # 模型嵌入维度
  hidden_dim: 512
  # Dropout 比例
  dropout: 0.1
  # 动作分块大小 (Action Chunking Size)
  chunk_size: 100
  # 相机数量 (CALVIN 环境中的观测相机)
  num_cameras: 1
  # 状态维度 (机器人关节角度等)
  # 注意: 根据实际数据，state 维度为 15
  state_dim: 15
  # 动作维度
  action_dim: 7
  # 是否使用 VAE (CVAE for ACT)
  use_vae: true
  # VAE 潜变量维度
  latent_dim: 32
  # KL 散度权重
  kl_weight: 10

# --- 训练超参数 ---
training:
  # 批处理大小 (Batch Size)
  batch_size: 32
  # 学习率 (Learning Rate)
  lr: 1.0e-4
  # 权重衰减
  weight_decay: 1.0e-4
  # 训练轮数 (Epochs)
  num_epochs: 100
  # 每个 epoch 的训练步数 (若为 null 则遍历全部数据)
  steps_per_epoch: null
  # 梯度裁剪阈值
  grad_clip_norm: 10.0
  # 学习率调度器
  lr_scheduler: "cosine"
  # 预热步数
  warmup_steps: 1000
  # 随机种子
  seed: 42

# --- 损失函数 (Loss Function) ---
loss:
  # 主损失: Action L1 Loss
  action_loss: "l1"
  # L1 Loss 权重
  action_loss_weight: 1.0
  # KL 散度损失权重 (VAE 正则化)
  kl_loss_weight: 10.0

# --- 优化器 (Optimizer) ---
optimizer:
  name: "AdamW"
  betas: [0.9, 0.999]
  eps: 1.0e-8

# --- 数据处理 ---
data:
  # 图像输入尺寸
  image_size: [224, 224]
  # 数据加载线程数 (降低为 2 以避免 malloc tcache 内存问题)
  num_workers: 2
  # 是否进行数据增强
  augmentation: true
  # 图像归一化均值 (ImageNet 标准)
  image_mean: [0.485, 0.456, 0.406]
  # 图像归一化标准差
  image_std: [0.229, 0.224, 0.225]
  # 每个环境最多使用的 episode 数量 (null 表示使用全部数据)
  # 设置较小的值可在设备性能受限时快速验证流程，例如: 200
  max_episodes_per_env: null

# --- 硬件与日志 ---
hardware:
  # 使用的 GPU 设备 (e.g., "cuda:0", "cpu")
  device: "cuda"
  # 是否使用混合精度训练
  use_amp: true

logging:
  # 日志后端: "wandb" 或 "swanlab"
  backend: "wandb"
  # WandB 实体 (用户名或组织名)
  # 注意: api.default_entity 可能返回默认组织(如 "models")，请在此指定你的个人账户名
  entity: "carrotfish1024"
  # 项目名称
  project: "ACT-Cross-Env-Generalization"
  # 日志记录频率 (每 N 步记录一次)
  log_interval: 50
  # 模型保存频率 (每 N 个 epoch 保存一次)
  save_interval: 10

# --- 路径配置 ---
paths:
  # 数据集根目录
  data_root: "./data/calvin"
  # 模型权重保存目录
  checkpoint_dir: "./checkpoints"
  # 日志输出目录
  log_dir: "./logs"
